version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: raca-db
    restart: always
    environment:
      - POSTGRES_USER=saiji_admin
      - POSTGRES_PASSWORD=nightingale@1435
      - POSTGRES_DB=raca_db
    ports:
      - "5432:5432"  # This is the line that was likely missing or broken
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: